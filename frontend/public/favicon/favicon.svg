<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="sprawl" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff2d78"/>
            <stop offset="100%" style="stop-color:#00e5ff"/>
        </linearGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="9" result="b"/>
            <feMerge>
                <feMergeNode in="b"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect x="28" y="28" width="456" height="456" rx="104" fill="#0a0a0f"/>
    <rect x="28" y="28" width="456" height="456" rx="104" fill="none" stroke="#ff2d78" stroke-width="10" stroke-opacity="0.45"/>

    <g filter="url(#glow)" stroke="url(#sprawl)" stroke-width="36" stroke-linecap="round" fill="none">
        <line x1="206" y1="116" x2="170" y2="396"/>
        <line x1="356" y1="116" x2="320" y2="396"/>
        <line x1="120" y1="206" x2="396" y2="206"/>
        <line x1="110" y1="306" x2="386" y2="306"/>
    </g>
</svg>
