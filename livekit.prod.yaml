# Production livekit.yaml for Sixth World Sunday.
# Single-node LiveKit (no Redis needed). Runs with network_mode: host on the Linux
# prod box. Ports offset +10 from defaults so it coexists with COB (788x) on the
# same host. Lives on the prod server only.

port: 7890
bind_addresses:
  - ""

rtc:
  tcp_port: 7891
  udp_port: 7892
  use_external_ip: false
  ips:
    includes:
      - 88.198.26.24/32
      - 10.0.0.1/32

keys:
  # Unique, strong key + secret (NOT "key/pass", NOT COB's). Mirror in Admin -> Voice.
  #   secret:  openssl rand -base64 48
  CHANGE_ME_KEY: CHANGE_ME_STRONG_SECRET

webhook:
  api_key: CHANGE_ME_KEY
  urls:
    # host-networked livekit reaches the bridged app via its host-published port.
    - http://localhost:2313/api/v1/livekit/webhook

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/H264
    - mime: video/VP8
    - mime: video/VP9
    - mime: video/AV1
    - mime: video/rtx

turn:
  enabled: true
  udp_port: 3488
